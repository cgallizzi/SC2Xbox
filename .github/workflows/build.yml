name: Build SC2Xbox.exe

# Builds a standalone Windows exe on every push/PR (sanity check) and attaches
# it to GitHub Releases when you push a version tag like v1.0.0.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed to create the Release and upload SC2Xbox.exe

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Pre-fetch SDL3 binaries
        # PySDL3 downloads SDL3.dll on first import; do it now so it gets bundled.
        run: python -c "import sdl3"

      - name: Build exe
        run: >
          pyinstaller --noconfirm --onefile --windowed --name SC2Xbox
          --icon icon.ico
          --add-data "config.default.json;."
          --add-data "logo.png;."
          --collect-all sdl3
          --collect-all vgamepad
          --hidden-import pystray._win32
          --hidden-import PIL._tkinter_finder
          app.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SC2Xbox-windows
          path: dist/SC2Xbox.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SC2Xbox.exe
